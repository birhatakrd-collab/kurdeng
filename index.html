<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdeng | کوردینگ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @font-face {
            font-family: 'rabar_041';
            src: url('./rabar_041.ttf') format('truetype');
        }

        :root {
            --bg-color: #f4f6f9;
            --surface-color: #ffffff;
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
            --primary-color: #FF8C00;
            --primary-hover: #e67e00;
            --border-color: #e0e6ed;
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.dark-mode {
            --bg-color: #0f0f11;
            --surface-color: #1a1a1e;
            --text-color: #f1f2f6;
            --text-muted: #a4b0be;
            --border-color: #2a2a30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'rabar_041', sans-serif; transition: background-color 0.4s, color 0.4s, border-color 0.4s; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Navigation */
        nav { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: var(--surface-color); border-bottom: 1px solid var(--border-color); }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: linear-gradient(135deg, var(--primary-color), var(--primary-hover)); color: white; width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; }
        .logo-text { font-size: 1.6rem; font-weight: bold; }
        .logo-text span { color: var(--primary-color); }
        
        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .user-info { display: none; align-items: center; gap: 10px; font-size: 0.95rem; }
        .btn-logout { background: transparent; border: 1px solid #ff4757; color: #ff4757; padding: 5px 15px; border-radius: 6px; cursor: pointer; }
        .btn-logout:hover { background: #ff4757; color: white; }
        .theme-toggle { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        /* Auth Modal */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--surface-color); border: 2px solid var(--primary-color); padding: 30px; border-radius: 15px; width: 90%; max-width: 380px; text-align: center; animation: popIn 0.5s; }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; color: var(--text-muted); font-weight: bold; }
        .auth-tab.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); margin-bottom: -2px; }
        
        .auth-form input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px; outline: none; }
        .auth-form input:focus { border-color: var(--primary-color); }
        .btn-auth { background: var(--primary-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        .btn-auth:hover { background: var(--primary-hover); }
        .auth-msg { margin-top: 15px; font-size: 0.85rem; color: #ff4757; }
        .auth-success { color: #2ecc71; }

        /* Main App */
        main { flex-grow: 1; display: none; flex-direction: column; align-items: center; padding: 30px 15px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .title-header { margin-bottom: 25px; font-size: 1.3rem; }
        .translator-wrapper { width: 100%; background: var(--surface-color); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); }
        .translation-boxes { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; }
        .box { display: flex; flex-direction: column; background: var(--bg-color); border-radius: 12px; border: 1px solid var(--border-color); }
        .box-header { display: flex; justify-content: space-between; padding: 10px 15px; color: var(--primary-color); border-bottom: 1px solid var(--border-color); }
        textarea { width: 100%; height: 180px; background: transparent; border: none; padding: 15px; color: var(--text-color); resize: none; outline: none; }
        .btn-swap { background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-muted); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .translate-action { text-align: center; margin-top: 20px; }
        .btn-translate { background: var(--primary-color); color: white; border: none; padding: 12px 40px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; }

        @media (max-width: 768px) {
            .translation-boxes { grid-template-columns: 1fr; }
            textarea { height: 150px; }
        }
    </style>
</head>
<body class="dark-mode">

    <div id="authOverlay">
        <div class="auth-box">
            <h2 style="color: var(--primary-color); margin-bottom: 20px;">Kurdeng</h2>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">چوونە ژوور</div>
                <div class="auth-tab" id="tabSignup" onclick="switchAuthTab('signup')">تۆمارکرن</div>
            </div>

            <div id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="ئیمەیلێ تە">
                <input type="password" id="loginPassword" placeholder="پاسۆرد">
                <button class="btn-auth" id="btnLogin">چوونە ژوور</button>
            </div>

            <div id="signupForm" class="auth-form" style="display: none;">
                <input type="text" id="signupName" placeholder="ناڤێ تە یێ سێیانی">
                <input type="email" id="signupEmail" placeholder="ئیمەیلەکێ دروست">
                <input type="password" id="signupPassword" placeholder="پاسۆرد (ل کێماتی ٦ پیت/هژمار)">
                <button class="btn-auth" id="btnSignup">دروستکرنا هەژمارێ</button>
            </div>

            <div id="authMessage" class="auth-msg"></div>
        </div>
    </div>

    <nav>
        <div class="logo-container">
            <div class="logo-icon"><i class="fa-solid fa-language"></i></div>
            <div class="logo-text">Kurd<span>eng</span></div>
        </div>
        <div class="nav-actions">
            <div class="user-info" id="userInfo">
                <i class="fa-solid fa-user"></i> <span id="userNameDisplay">بکارهێنەر</span>
                <button class="btn-logout" id="btnLogout">دەرکەفتن</button>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-sun" id="themeIcon"></i></button>
        </div>
    </nav>

    <main id="mainApp">
        <h2 class="title-header">زیرەکترین وەرگێڕان ب زاراڤێ بادینی 😍</h2>
        <div class="translator-wrapper">
            <div class="translation-boxes">
                <div class="box">
                    <div class="box-header"><span>ئینگلیزی</span><i class="fa-solid fa-volume-high"></i></div>
                    <textarea id="englishInput" placeholder="Enter your text here..."></textarea>
                </div>
                <button class="btn-swap"><i class="fa-solid fa-arrow-right-arrow-left"></i></button>
                <div class="box">
                    <div class="box-header"><span>کوردی (بادینی)</span><i class="fa-regular fa-copy"></i></div>
                    <textarea id="kurdishOutput" readonly placeholder="ئەنجام دێ ل ڤێرە دیار بیت..."></textarea>
                </div>
            </div>
            <div class="translate-action">
                <button class="btn-translate" onclick="startTranslation()"><i class="fa-solid fa-language"></i> وەرگێڕان</button>
            </div>
        </div>
    </main>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        function switchAuthTab(tab) {
            document.getElementById('authMessage').innerText = "";
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('signupForm').style.display = 'none';
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabSignup').classList.remove('active');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('signupForm').style.display = 'block';
                document.getElementById('tabSignup').classList.add('active');
                document.getElementById('tabLogin').classList.remove('active');
            }
        }

        let typingTimer;
        function startTranslation() {
            const input = document.getElementById('englishInput').value.trim();
            const outputBox = document.getElementById('kurdishOutput');
            if(!input) { alert("هیڤییە تێکستەکێ بنڤیسە!"); return; }
            
            clearInterval(typingTimer);
            outputBox.value = ""; 
            const message = "کار یێ ل سەر دهێتە کرن، دێ ب زوترین دەم ئەڤ تایبەتمەندییە بەردەست بیت...";
            let i = 0;
            typingTimer = setInterval(() => {
                if (i < message.length) { outputBox.value += message.charAt(i); i++; } 
                else { clearInterval(typingTimer); }
            }, 40);
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASqxKFyhy-9QxeQeJ70Ihiq2ziY1HBbNg",
            authDomain: "kurdeng-31aa6.firebaseapp.com",
            projectId: "kurdeng-31aa6",
            storageBucket: "kurdeng-31aa6.firebasestorage.app",
            messagingSenderId: "113701120840",
            appId: "1:113701120840:web:2b2181cfb363682d99a17d",
            measurementId: "G-EDRS836LBF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // زمانێ نامەیا ئیمەیلی
        auth.languageCode = 'ku'; 

        const authMsg = document.getElementById('authMessage');

        // چاڤدێرییا دۆخێ بکارهێنەری (ئایا یێ ژوورە یان نە)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if(user.emailVerified) {
                    // ئەگەر ئیمەیل پشتڕاستکری بیت
                    document.getElementById('authOverlay').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'flex';
                    document.getElementById('userInfo').style.display = 'flex';
                    document.getElementById('userNameDisplay').innerText = user.displayName || "بکارهێنەر";
                } else {
                    // ئەگەر هێشتا پشتڕاست نەکرییە
                    document.getElementById('authOverlay').style.display = 'flex';
                    document.getElementById('mainApp').style.display = 'none';
                    document.getElementById('userInfo').style.display = 'none';
                    authMsg.className = "auth-msg";
                    authMsg.innerText = "هیڤییە سەرەدانێ ل ئیمەیلێ خۆ بکە و لینکی کلیک بکە بۆ پشتڕاستکرنێ، پاشی وەرە چوونە ژوور.";
                    signOut(auth); // دەرخستن تا پشتڕاست دکەت
                }
            } else {
                // ئەگەر یێ دەرکەفتی بیت
                document.getElementById('authOverlay').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('userInfo').style.display = 'none';
            }
        });

        // دروستکرنا هەژمارێ (Signup)
        document.getElementById('btnSignup').addEventListener('click', () => {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            if(!name || !email || !password) {
                authMsg.className = "auth-msg"; authMsg.innerText = "هیڤییە هەمی بۆشاییان تژی بکە!"; return;
            }

            authMsg.className = "auth-msg auth-success";
            authMsg.innerText = "چاڤەڕێ بە...";

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    // زێدەکرنا ناڤی بۆ پرۆفایلی
                    updateProfile(user, { displayName: name }).then(() => {
                        // فرێکرنا لینکێ پشتڕاستکرنێ بۆ ئیمەیلی
                        sendEmailVerification(user).then(() => {
                            authMsg.className = "auth-msg auth-success";
                            authMsg.innerText = "هەژمار هاتە دروستکرن! لینکێ پشتڕاستکرنێ بۆ ئیمەیلێ تە هاتە فرێکرن. هیڤییە پشتڕاست بکە.";
                            document.getElementById('signupForm').reset();
                        });
                    });
                })
                .catch((error) => {
                    authMsg.className = "auth-msg";
                    if(error.code === 'auth/email-already-in-use') authMsg.innerText = "ئەڤ ئیمەیلە یێ بکارئینایە.";
                    else if(error.code === 'auth/weak-password') authMsg.innerText = "پاسۆرد گەلەکێ لاوازە.";
                    else authMsg.innerText = "خەلەتیەک ڕوویدا: " + error.message;
                });
        });

        // چوونە ژوور (Login)
        document.getElementById('btnLogin').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if(!email || !password) {
                authMsg.className = "auth-msg"; authMsg.innerText = "ئیمەیل و پاسۆردی بنڤیسە!"; return;
            }

            authMsg.className = "auth-msg auth-success";
            authMsg.innerText = "چاڤەڕێ بە...";

            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => {
                    authMsg.className = "auth-msg";
                    if(error.code === 'auth/invalid-credential') authMsg.innerText = "ئیمەیل یان پاسۆردێ تە د خەلەتن.";
                    else authMsg.innerText = "خەلەتیەک ڕوویدا.";
                });
        });

        // دەرکەفتن (Logout)
        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => {
                authMsg.className = "auth-msg"; authMsg.innerText = "";
            });
        });
    </script>
</body>
</html>
